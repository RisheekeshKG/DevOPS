apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: devops-org
      defaultBucket: patient_vitals
      tlsSkipVerify: true
    secureJsonData:
      token: devops-token
    isDefault: true
    editable: true
